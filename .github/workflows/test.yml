name: Test (reusable)

# End-to-end test from source: build the demo for each foreign interface
# (DPI/VPI/NVC), have it connect to a listener over TCP, and assert the protocol
# handshake (every component announces itself; the heartbeat flag streams
# values). Reused by ci.yml (PR / push) and release.yml (gate a tag before
# publishing). Run on x86_64 and arm64 Linux to prove cross-architecture
# behavior.
#
# NVC is the gated VHPIDIRECT simulator. GHDL/VHPIDIRECT is currently EXPERIMENTAL
# and not gated: GHDL's marshaling of an `in string` + `out integer` foreign
# procedure is version-dependent (recent GHDL emits "NOT IMPLEMENTED"), so the
# per-instance NAME does not pass through reliably. NVC drives the exact same
# VHDL + shim, so the VHPIDIRECT path itself is covered.
on:
  workflow_call:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install simulators
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential verilator iverilog
      - name: Install NVC
        uses: ./.github/actions/setup-nvc
      - name: Tool versions
        run: verilator --version; iverilog -V | head -1; nvc --version | head -1
      - name: End-to-end (DPI / VPI / NVC from source)
        run: make e2e SIM=dpi,vpi,nvc
