name: Artifact test (reusable)

# Drive the demo against the PREBUILT bundles (uploaded earlier in the run by
# build-artifacts.yml) with every gated FOSS simulator available per OS, and
# assert the protocol handshake. The backend is NOT recompiled -- each simulator
# links/loads the shipped library, exactly as a downstream user would. Reused by
# ci.yml (PR / push) and release.yml (gate a tag before publishing).
#
# Gated simulators: Verilator (DPI), Icarus (VPI), NVC (VHPIDIRECT). GHDL is
# EXPERIMENTAL and not gated here (see test.yml for why); the VHPIDIRECT library
# it would load is the same one NVC exercises.
on:
  workflow_call:

jobs:
  # POSIX bundles: Verilator (DPI), NVC (VHPIDIRECT), Icarus (VPI), on Linux and
  # macOS. The harness skips any simulator that isn't installed.
  artifact-test:
    name: artifact-test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64, os: ubuntu-latest,     artifact: interactive-linux-x86_64 }
          - { name: linux-arm64,  os: ubuntu-24.04-arm,  artifact: interactive-linux-arm64 }
          - { name: macos-arm64,  os: macos-15,          artifact: interactive-macos-arm64 }
          - { name: macos-x86_64, os: macos-15-intel,    artifact: interactive-macos-x86_64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Download prebuilt artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Install FOSS simulators (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential verilator iverilog
      - name: Install FOSS simulators (macOS)
        if: runner.os == 'macOS'
        run: brew install verilator icarus-verilog
      - name: Install NVC
        uses: ./.github/actions/setup-nvc      # installs Homebrew on arm64 Linux too

      - name: Test prebuilt artifacts (Verilator/DPI, Icarus/VPI, NVC/VHPIDIRECT)
        run: python3 tests/e2e.py --dist dist --sim dpi,vpi,nvc

  # Windows (MinGW) bundle: Verilator (DPI, links the shipped import lib), NVC
  # (VHPIDIRECT, loaded at runtime with --load), and Icarus (VPI, loads the
  # shipped .vpi). The MSVC bundle is not tested here: only commercial sims
  # (Questa) consume it.
  artifact-test-windows:
    name: artifact-test (windows-x86_64-mingw)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download prebuilt artifact
        uses: actions/download-artifact@v4
        with:
          name: interactive-windows-x86_64-mingw
          path: dist
      - name: Install NVC
        uses: nickg/setup-nvc@v1
        with:
          version: latest
      - name: Set up MSYS2 (MinGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            make
            mingw-w64-x86_64-python
            mingw-w64-x86_64-verilator
            mingw-w64-x86_64-iverilog
      - name: Test prebuilt artifacts (Verilator/DPI, NVC/VHPIDIRECT --load, Icarus/VPI)
        shell: msys2 {0}
        run: |
          verilator --version
          nvc --version
          iverilog -V | head -1
          python3 tests/e2e.py --dist dist --sim dpi,nvc,vpi
